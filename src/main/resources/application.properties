# ===================================================================
# CONFIGURATION GENERALE DE L'APPLICATION
# ===================================================================
spring.application.name=colisender

# ===================================================================
# CONFIGURATION DE LA CONNEXION POSTGRESQL (Neon)
# ===================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# EMAIL (Configuration Brevo mise à jour)
# ===================================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===================================================================
# JWT
# ===================================================================
jwt.secret=${JWT_SECRET}

# ===================================================================
# CAMPAY
# ===================================================================
campay.base-url=https://demo.campay.net/api
campay.app-username=${CAMPAY_APP_USERNAME}
campay.app-password=${CAMPAY_APP_PASSWORD}
campay.permanent-token=${CAMPAY_PERMANENT_TOKEN}

# ===================================================================
# FACE++
# ===================================================================
faceplusplus.api-key=${FACEPLUSPLUS_API_KEY}
faceplusplus.api-secret=${FACEPLUSPLUS_API_SECRET}
faceplusplus.seuil-confiance=70.0

# ===================================================================
# SERVEUR (Render injecte PORT automatiquement)
# ===================================================================
server.port=${PORT:8080}
server.address=0.0.0.0